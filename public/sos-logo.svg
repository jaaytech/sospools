<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">SOS Pools Logo</title>
  <desc id="desc">Circular SOS Pools Service and Repairs logo with wave lines.</desc>
  <defs>
    <style>
      .red { fill: #e53b2f; }
      .teal { fill: #1f9ea8; }
      .stroke-red { stroke: #e53b2f; }
      .stroke-teal { stroke: #1f9ea8; }
      .font-bold { font-family: Arial, Helvetica, sans-serif; font-weight: 700; }
      .font-black { font-family: Arial, Helvetica, sans-serif; font-weight: 900; }
    </style>
  </defs>

  <circle cx="160" cy="160" r="150" fill="#ffffff" class="stroke-red" stroke-width="8" />

  <text x="160" y="88" text-anchor="middle" class="font-black red" font-size="76" letter-spacing="2">S.O.S</text>

